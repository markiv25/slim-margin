name: Package skill

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .skill archive
        run: |
          SKILL_DIR="plugins/token-budget-discipline/skills/token-budget-discipline"
          cd "$SKILL_DIR"
          zip -r "$GITHUB_WORKSPACE/token-budget-discipline.skill" .
          cd "$GITHUB_WORKSPACE"
          ls -la token-budget-discipline.skill

      - name: Validate marketplace.json
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          echo "marketplace.json is valid JSON"

      - name: Validate plugin.json
        run: |
          python3 -c "import json; json.load(open('plugins/token-budget-discipline/.claude-plugin/plugin.json'))"
          echo "plugin.json is valid JSON"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: token-budget-discipline
          path: token-budget-discipline.skill

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: token-budget-discipline.skill
          generate_release_notes: true
